<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}TurboVid Admin{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #202124;
      --muted: #5f6368;
      --border: #dadce0;
      --card: #fff;
      --accent: #1a73e8;
      --success: #1e8e3e;
      --danger: #d93025;
      --warn: #f29900;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { margin: 0; font-size: 18px; }
    header a { color: var(--accent); text-decoration: none; margin-left: 16px; font-size: 13px; }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 6px; overflow: hidden; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #f1f3f4; font-weight: 600; font-size: 12px; color: var(--muted); text-transform: uppercase; }
    tr:hover td { background: #f8f9fa; }
    .job-id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-queued { background: #e8eaed; color: var(--muted); }
    .badge-running { background: #d2e3fc; color: var(--accent); }
    .badge-completed { background: #ceead6; color: var(--success); }
    .badge-failed { background: #fadbd8; color: var(--danger); }
    .badge-killed { background: #e8eaed; color: var(--muted); }
    .badge-done { background: #ceead6; color: var(--success); }
    .badge-processing { background: #d2e3fc; color: var(--accent); }
    .badge-pending { background: #e8eaed; color: var(--muted); }
    pre.logs { background: #1e1e1e; color: #e6e6e6; padding: 12px; border-radius: 6px; overflow: auto; max-height: 460px; font-size: 12px; line-height: 1.45; }
    .htmx-indicator { opacity: 0; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: 200px 1fr; gap: 8px 16px; }
    .label { color: var(--muted); }
    button { padding: 6px 12px; border: 1px solid var(--border); background: var(--card); border-radius: 4px; cursor: pointer; color: var(--accent); }
    button:hover { background: #f8f9fa; }
    button.danger { color: var(--danger); }
    a { color: var(--accent); }
    .empty { padding: 40px; text-align: center; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>🎬 TurboVid Admin</h1>
    <div>
      <a href="/admin/">Dashboard</a>
      <a href="/admin/settings">Settings</a>
      <a href="/admin/tunnel">Tunnel</a>
      <a href="/health/deep" target="_blank">/health/deep</a>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
